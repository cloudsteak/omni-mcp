{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "omni-mcp.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "omni-mcp.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
automountServiceAccountToken: false
{{- end }}
