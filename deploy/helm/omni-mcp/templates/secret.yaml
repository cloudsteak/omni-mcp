apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omni-mcp.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "omni-mcp.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secretEnv }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
