replicaCount: 2

image:
  repository: omni-mcp
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  OMNI_MCP_ENVIRONMENT: production
  OMNI_MCP_LOG_LEVEL: INFO
  OMNI_MCP_DATABASE_URL: postgresql+psycopg://omni_mcp:omni_mcp@postgres:5432/omni_mcp
  OMNI_MCP_AUTO_CREATE_SCHEMA: "true"
  OMNI_MCP_MIN_POLL_INTERVAL_HOURS: "2"
  OMNI_MCP_MAX_POLL_INTERVAL_HOURS: "24"
  OMNI_MCP_MIN_RETENTION_DAYS: "7"
  OMNI_MCP_MAX_RETENTION_DAYS: "30"
  OMNI_MCP_ENABLE_HTTP_SKILL: "true"
  OMNI_MCP_ENABLE_FILE_READ_SKILL: "false"
  OMNI_MCP_ENABLE_TIME_SKILL: "true"
  OMNI_MCP_ENABLE_JSON_SKILL: "true"
  OMNI_MCP_ENABLE_RSS_DIGEST_SKILLS: "true"

secretEnv:
  OMNI_MCP_CLIENT_AUTH_SHARED_SECRET: ""
  OMNI_MCP_SLACK_SIGNING_SECRET: ""
  OMNI_MCP_OPENAI_API_KEY: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 1
