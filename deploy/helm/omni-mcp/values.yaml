replicaCount: 2

image:
  repository: omni-mcp
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  OMNI_MCP_ENVIRONMENT: production
  OMNI_MCP_LOG_LEVEL: INFO
  OMNI_MCP_ENABLE_HTTP_SKILL: "true"
  OMNI_MCP_ENABLE_FILE_READ_SKILL: "false"
  OMNI_MCP_ENABLE_TIME_SKILL: "true"
  OMNI_MCP_ENABLE_JSON_SKILL: "true"

secretEnv:
  OMNI_MCP_CLIENT_AUTH_SHARED_SECRET: ""
  OMNI_MCP_SLACK_SIGNING_SECRET: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""

podDisruptionBudget:
  enabled: true
  minAvailable: 1
